<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Update</title>

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #0f0f1a);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .card {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(20px);
        padding: 30px;
        border-radius: 20px;
        width: 300px;
        text-align: center;
        box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    h2 {
        margin-bottom: 10px;
    }

    .progress-bar {
        width: 100%;
        height: 10px;
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 20px;
    }

    .progress {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00f5a0, #00d9f5);
        transition: width 0.3s;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(90deg, #ff416c, #ff4b2b);
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        opacity: 0.8;
    }

    .footer {
        margin-top: 20px;
        font-size: 12px;
        opacity: 0.8;
    }

    .whatsapp {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
        text-decoration: none;
        color: #25D366;
        font-weight: bold;
    }

    .whatsapp img {
        width: 18px;
        height: 18px;
    }
</style>

</head>

<body>

<div class="card">
    <h2>⚙️ System Update</h2>
    <p id="status">Preparing update...</p>

    <div class="progress-bar">
        <div class="progress" id="bar"></div>
    </div>

    <button onclick="startUpdate()">Start Update</button>
</div>

<script>
function startUpdate() {
    let progress = 0;
    let bar = document.getElementById("bar");
    let status = document.getElementById("status");

    let interval = setInterval(() => {
        progress += Math.random() * 10;
        bar.style.width = progress + "%";

        if (progress > 95) {
            status.innerText = "Almost done...";
        }

        if (progress >= 100) {
            clearInterval(interval);
            setTimeout(() => {
                document.body.innerHTML = `
                <div style="text-align:center;">
                    <h1>😂 April Fool!</h1>
                    <p>Your device is perfectly fine!</p>

                    <div class="footer">
                        <p>Powered by <b>MADXROHIT</b></p>

                        <a class="whatsapp" href="https://whatsapp.com/channel/0029VakDgLmBA1f6TRykhY0E" target="_blank">
                            <img src="https://img.icons8.com/color/48/whatsapp--v1.png"/>
                            Follow on WhatsApp
                        </a>
                    </div>
                </div>`;
            }, 1000);
        }
    }, 500);
}
</script>

</body>
</html>
